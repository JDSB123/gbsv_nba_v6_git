name: CI/CD

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# Prevent overlapping deployments; cancel in-flight runs on same ref
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  ACR_NAME: acrnbagbsvv6
  IMAGE_NAME: nba-gbsv-v6
  RESOURCE_GROUP: nba_gbsv_v6_az
  API_APP: ca-nba-gbsv-v6-api
  WORKER_APP: ca-nba-gbsv-v6-worker

permissions:
  contents: read

# ── Test & Lint ─────────────────────────────────────────────────
jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: nba_gbsv
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Lint
        run: ruff check src/ tests/

      - name: Run tests
        env:
          ODDS_API_KEY: test-odds-key-ci
          BASKETBALL_API_KEY: test-basketball-key-ci
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/nba_gbsv
          APP_ENV: test
          LOG_LEVEL: WARNING
        run: pytest tests/ -v

  # ── Build, Scan & Push ──────────────────────────────────────────
  build:
    needs: test
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write   # for uploading Trivy SARIF

    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Log in to ACR
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push to ACR
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif

  # ── Deploy to Azure Container Apps ──────────────────────────────
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"
          cache: "pip"

      - uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Run database migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          # Temporarily allow GitHub runner through PostgreSQL firewall
          RUNNER_IP=$(curl -s https://checkip.amazonaws.com)
          az postgres flexible-server firewall-rule create \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --name psql-nba-gbsv-v6 \
            --rule-name allow-gha-${{ github.run_id }} \
            --start-ip-address "$RUNNER_IP" \
            --end-ip-address "$RUNNER_IP"

          pip install --no-cache-dir -r requirements.txt
          python -m src migrate

          # Clean up firewall rule
          az postgres flexible-server firewall-rule delete \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --name psql-nba-gbsv-v6 \
            --rule-name allow-gha-${{ github.run_id }} --yes

      - name: Deploy API to Container Apps
        run: |
          az containerapp update \
            --name ${{ env.API_APP }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Deploy Worker to Container Apps
        run: |
          az containerapp update \
            --name ${{ env.WORKER_APP }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Verify API health
        run: |
          API_FQDN=$(az containerapp show \
            --name ${{ env.API_APP }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query "properties.configuration.ingress.fqdn" -o tsv)

          echo "Waiting for API at https://${API_FQDN} ..."
          for i in $(seq 1 12); do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "https://${API_FQDN}/health" || echo "000")
            if [ "$HTTP_CODE" = "200" ]; then
              echo "✅ API healthy (HTTP 200)"
              exit 0
            fi
            echo "⏳ Got HTTP $HTTP_CODE — retrying in 10s..."
            sleep 10
          done
          echo "❌ API did not become healthy within 120s"
          exit 1
