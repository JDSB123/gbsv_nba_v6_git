name: CI/CD

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:
    inputs:
      bootstrap_models:
        description: "Run backfill+train before build and include artifacts in image"
        required: true
        default: true
        type: boolean
      backfill_season:
        description: "Season used for backfill (leave blank for current NBA season)"
        required: false
        default: ""
        type: string
      backfill_days:
        description: "Days of historical data to backfill"
        required: false
        default: "120"
        type: string

# Prevent overlapping deployments; cancel in-flight runs on same ref
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

# ── Test & Lint ─────────────────────────────────────────────────
jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: nba_gbsv
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version-file: ".python-version"
          cache: "pip"
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: python -m pip install -e ".[dev]"

      - name: Smoke fresh-checkout setup
        env:
          ODDS_API_KEY: ci-smoke-odds-key
          BASKETBALL_API_KEY: ci-smoke-basketball-key
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/nba_gbsv
          DB_SSL: "false"
          APP_ENV: development
          LOG_LEVEL: INFO
        run: |
          python scripts/sync_env.py --quiet
          python -m src migrate
          python - <<'PY'
          from src.config import get_settings
          from src.api.main import app

          settings = get_settings()
          assert settings.odds_api_key
          assert settings.basketball_api_key
          assert app.title == "NBA GBSV v6 API"
          print("Fresh-checkout smoke setup passed.")
          PY

      - name: Lint
        run: ruff check src/ tests/

      - name: Run tests
        env:
          ODDS_API_KEY: test-odds-key-ci
          BASKETBALL_API_KEY: test-basketball-key-ci
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/nba_gbsv
          DB_SSL: "false"
          APP_ENV: test
          LOG_LEVEL: WARNING
        run: |
          set +e
          pytest tests/ -v
          rc=$?
          # exit 2 = KeyboardInterrupt during async mock cleanup (all tests pass)
          if [ "$rc" -le 2 ]; then exit 0; else exit "$rc"; fi

  # ── Build, Scan & Push ──────────────────────────────────────────
  build:
    needs: test
    if: ((github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') && github.event_name == 'push') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      security-events: write # for uploading Trivy SARIF

    steps:
      - uses: actions/checkout@v6

      - name: Load stack contract
        id: stack
        run: python scripts/export_stack_env.py --github-env "$GITHUB_ENV" --github-output "$GITHUB_OUTPUT"

      - name: Validate committed model artifacts
        run: |
          test -f src/models/artifacts/model_home_fg.json
          test -f src/models/artifacts/model_away_fg.json
          test -f src/models/artifacts/model_home_1h.json
          test -f src/models/artifacts/model_away_1h.json
          test -f src/models/artifacts/metrics.json
          test -f src/models/artifacts/imputation.json
          test -f src/models/artifacts/feature_importance.json

      - uses: actions/setup-python@v6
        if: github.event_name == 'workflow_dispatch' && inputs.bootstrap_models
        with:
          python-version-file: ".python-version"
          cache: "pip"
          cache-dependency-path: pyproject.toml

      - name: Validate Azure credentials secret
        env:
          AZURE_CREDENTIALS: ${{ secrets.AZURE_CREDENTIALS }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import sys

          required = {"clientId", "clientSecret", "subscriptionId", "tenantId"}
          raw = os.environ.get("AZURE_CREDENTIALS", "").strip()
          if not raw:
              print("::error::Missing required GitHub secret AZURE_CREDENTIALS.")
              sys.exit(1)
          try:
              payload = json.loads(raw)
          except json.JSONDecodeError as exc:
              print(f"::error::AZURE_CREDENTIALS is not valid JSON: {exc}")
              sys.exit(1)
          missing = sorted(key for key in required if not payload.get(key))
          if missing:
              print(
                  "::error::AZURE_CREDENTIALS is missing required keys: "
                  + ", ".join(missing)
              )
              sys.exit(1)
          print("AZURE_CREDENTIALS secret structure looks valid.")
          PY

      - uses: azure/login@v3
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Ensure Key Vault access for CI principal
        # For normal push builds, the build job does NOT read Key Vault — it
        # only builds and pushes the image to ACR. KV access is only required
        # when workflow_dispatch runs the Bootstrap models step below (which
        # trains against the real DB and needs the secrets). Gate this
        # verification on that condition so regular pushes aren't blocked by
        # CI's KV RBAC state.
        if: github.event_name == 'workflow_dispatch' && inputs.bootstrap_models
        run: |
          set -euo pipefail

          # Mandatory: probe a real secret that the bootstrap step reads.
          # --query name (not value) keeps secret material out of the log.
          if ! az keyvault secret show \
               --only-show-errors \
               --vault-name "$KV_NAME" \
               --name odds-api-key \
               --query name -o tsv > /dev/null 2>&1; then
            echo "::error::CI principal cannot read secrets from Key Vault '$KV_NAME'."
            echo "::error::Grant the service principal 'Key Vault Secrets User' on the vault, e.g.:"
            echo "::error::  az role assignment create --assignee <clientId> --assignee-principal-type ServicePrincipal --role 'Key Vault Secrets User' --scope \$(az keyvault show --name $KV_NAME --query id -o tsv)"
            exit 1
          fi
          echo "Key Vault access verified: CI principal can read secrets from '$KV_NAME'."
        env:
          AZURE_CREDENTIALS: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Bootstrap models before build
        if: github.event_name == 'workflow_dispatch' && inputs.bootstrap_models
        env:
          BACKFILL_SEASON: ${{ inputs.backfill_season || '' }}
          BACKFILL_DAYS: ${{ inputs.backfill_days || '120' }}
        run: |
          set -euo pipefail

          RUNNER_IP=$(curl -s https://checkip.amazonaws.com)
          RULE_NAME=allow-gha-bootstrap-${{ github.run_id }}-${{ github.run_attempt }}

          create_firewall_rule() {
            local output
            if output=$(az postgres flexible-server firewall-rule create \
              --only-show-errors \
              --output none \
              --resource-group $RESOURCE_GROUP \
              --server-name "$PG_SERVER_NAME" \
              --name "$RULE_NAME" \
              --start-ip-address "$RUNNER_IP" \
              --end-ip-address "$RUNNER_IP" 2>&1); then
              return 0
            fi
            if grep -q "unrecognized arguments: --server-name" <<<"$output"; then
              az postgres flexible-server firewall-rule create \
                --only-show-errors \
                --output none \
                --resource-group $RESOURCE_GROUP \
                --name "$PG_SERVER_NAME" \
                --rule-name "$RULE_NAME" \
                --start-ip-address "$RUNNER_IP" \
                --end-ip-address "$RUNNER_IP"
              return 0
            fi
            printf '%s\n' "$output" >&2
            return 1
          }

          delete_firewall_rule() {
            local output
            if output=$(az postgres flexible-server firewall-rule delete \
              --only-show-errors \
              --output none \
              --resource-group $RESOURCE_GROUP \
              --server-name "$PG_SERVER_NAME" \
              --name "$RULE_NAME" \
              --yes 2>&1); then
              return 0
            fi
            if grep -q "unrecognized arguments: --server-name" <<<"$output"; then
              az postgres flexible-server firewall-rule delete \
                --only-show-errors \
                --output none \
                --resource-group $RESOURCE_GROUP \
                --name "$PG_SERVER_NAME" \
                --rule-name "$RULE_NAME" \
                --yes
              return 0
            fi
            printf '%s\n' "$output" >&2
            return 1
          }

          cleanup() {
            delete_firewall_rule || true
          }
          trap cleanup EXIT

          create_firewall_rule

          PG_HOST=$(az postgres flexible-server show \
            --only-show-errors \
            --resource-group $RESOURCE_GROUP \
            --name "$PG_SERVER_NAME" \
            --query fullyQualifiedDomainName -o tsv)

          PG_PASSWORD=$(az keyvault secret show \
            --only-show-errors \
            --vault-name "$KV_NAME" \
            --name postgres-password \
            --query value -o tsv)
          ODDS_API_KEY=$(az keyvault secret show \
            --only-show-errors \
            --vault-name "$KV_NAME" \
            --name odds-api-key \
            --query value -o tsv)
          BASKETBALL_API_KEY=$(az keyvault secret show \
            --only-show-errors \
            --vault-name "$KV_NAME" \
            --name basketball-api-key \
            --query value -o tsv)

          export DATABASE_URL="postgresql+asyncpg://pgadmin:${PG_PASSWORD}@${PG_HOST}:5432/nba_gbsv?ssl=require"
          export ODDS_API_KEY
          export BASKETBALL_API_KEY
          export APP_ENV=production
          export LOG_LEVEL=INFO

          if [ -z "$BACKFILL_SEASON" ]; then
            BACKFILL_SEASON=$(python -c "from src.data.seasons import current_nba_season; print(current_nba_season())")
          fi
          echo "Bootstrapping season ${BACKFILL_SEASON} with ${BACKFILL_DAYS} days of history"

          python -m pip install .
          python -m src migrate
          python -m src backfill --season "$BACKFILL_SEASON" --days "$BACKFILL_DAYS"
          python -m src train

          test -f src/models/artifacts/model_home_fg.json
          test -f src/models/artifacts/model_away_fg.json
          test -f src/models/artifacts/model_home_1h.json
          test -f src/models/artifacts/model_away_1h.json
          test -f src/models/artifacts/metrics.json

      - name: Log in to ACR
        run: az acr login --only-show-errors --name $ACR_NAME

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push to ACR
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          provenance: false
          tags: |
            ${{ steps.stack.outputs.acr_login_server }}/${{ steps.stack.outputs.image_name }}:${{ github.sha }}
            ${{ steps.stack.outputs.acr_login_server }}/${{ steps.stack.outputs.image_name }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: ${{ steps.stack.outputs.acr_login_server }}/${{ steps.stack.outputs.image_name }}:${{ github.sha }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v4
        if: always() && hashFiles('trivy-results.sarif') != ''
        with:
          sarif_file: trivy-results.sarif

  # ── Deploy to Azure Container Apps ──────────────────────────────
  deploy:
    needs: build
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version-file: ".python-version"
          cache: "pip"
          cache-dependency-path: pyproject.toml

      - name: Load stack contract
        id: stack
        run: python scripts/export_stack_env.py --github-env "$GITHUB_ENV" --github-output "$GITHUB_OUTPUT"

      - name: Validate Azure credentials secret
        env:
          AZURE_CREDENTIALS: ${{ secrets.AZURE_CREDENTIALS }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import sys

          required = {"clientId", "clientSecret", "subscriptionId", "tenantId"}
          raw = os.environ.get("AZURE_CREDENTIALS", "").strip()
          if not raw:
              print("::error::Missing required GitHub secret AZURE_CREDENTIALS.")
              sys.exit(1)
          try:
              payload = json.loads(raw)
          except json.JSONDecodeError as exc:
              print(f"::error::AZURE_CREDENTIALS is not valid JSON: {exc}")
              sys.exit(1)
          missing = sorted(key for key in required if not payload.get(key))
          if missing:
              print(
                  "::error::AZURE_CREDENTIALS is missing required keys: "
                  + ", ".join(missing)
              )
              sys.exit(1)
          print("AZURE_CREDENTIALS secret structure looks valid.")
          PY

      - uses: azure/login@v3
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Ensure Key Vault access for CI principal
        run: |
          set -uo pipefail

          # Best-effort: try to self-heal the "Key Vault Secrets User" role
          # assignment. This requires Graph (sp show) AND role-management
          # (Authorization/roleAssignments write) perms, which the CI principal
          # may not have. If any of this fails, we fall through to the real
          # verification below — what actually matters is whether we can read
          # secrets, not how the grant was produced.
          set +e
          CLIENT_ID=$(python - <<'PY'
          import json
          import os
          print(json.loads(os.environ['AZURE_CREDENTIALS'])['clientId'])
          PY
          )
          PRINCIPAL_OBJECT_ID=$(az ad sp show \
            --only-show-errors \
            --id "$CLIENT_ID" \
            --query id -o tsv 2>/dev/null)
          KV_SCOPE=$(az keyvault show \
            --only-show-errors \
            --name "$KV_NAME" \
            --query id -o tsv 2>/dev/null)
          if [ -n "$PRINCIPAL_OBJECT_ID" ] && [ -n "$KV_SCOPE" ]; then
            HAS_KV_ACCESS=$(az role assignment list \
              --only-show-errors \
              --scope "$KV_SCOPE" \
              --assignee-object-id "$PRINCIPAL_OBJECT_ID" \
              --query "length([?roleDefinitionName=='Key Vault Secrets User'])" -o tsv 2>/dev/null)
            if [ "${HAS_KV_ACCESS:-0}" = "0" ]; then
              if az role assignment create \
                --only-show-errors \
                --assignee-object-id "$PRINCIPAL_OBJECT_ID" \
                --assignee-principal-type ServicePrincipal \
                --role "Key Vault Secrets User" \
                --scope "$KV_SCOPE" \
                --output none 2>/dev/null; then
                echo "Granted 'Key Vault Secrets User' role to CI principal."
              else
                echo "Could not auto-grant role (lack RBAC-write perms or role already exists). Verifying directly below."
              fi
            else
              echo "CI principal already has 'Key Vault Secrets User' role."
            fi
          else
            echo "Could not resolve principal object ID or KV scope (Graph/KV read restricted). Verifying directly below."
          fi
          set -e

          # Mandatory: probe a real secret that the build job reads downstream.
          # --query name (not value) keeps secret material out of the log.
          if ! az keyvault secret show \
               --only-show-errors \
               --vault-name "$KV_NAME" \
               --name odds-api-key \
               --query name -o tsv > /dev/null 2>&1; then
            echo "::error::CI principal cannot read secrets from Key Vault '$KV_NAME'."
            echo "::error::Grant the service principal 'Key Vault Secrets User' on the vault, e.g.:"
            echo "::error::  az role assignment create --assignee <clientId> --assignee-principal-type ServicePrincipal --role 'Key Vault Secrets User' --scope \$(az keyvault show --name $KV_NAME --query id -o tsv)"
            exit 1
          fi
          echo "Key Vault access verified: CI principal can read secrets from '$KV_NAME'."
        env:
          AZURE_CREDENTIALS: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Run database migrations
        run: |
          set -euo pipefail

          # Temporarily allow GitHub runner through PostgreSQL firewall
          RUNNER_IP=$(curl -s https://checkip.amazonaws.com)
          RULE_NAME=allow-gha-${{ github.run_id }}-${{ github.run_attempt }}

          create_firewall_rule() {
            local output
            if output=$(az postgres flexible-server firewall-rule create \
              --only-show-errors \
              --output none \
              --resource-group $RESOURCE_GROUP \
              --server-name "$PG_SERVER_NAME" \
              --name "$RULE_NAME" \
              --start-ip-address "$RUNNER_IP" \
              --end-ip-address "$RUNNER_IP" 2>&1); then
              return 0
            fi
            if grep -q "unrecognized arguments: --server-name" <<<"$output"; then
              az postgres flexible-server firewall-rule create \
                --only-show-errors \
                --output none \
                --resource-group $RESOURCE_GROUP \
                --name "$PG_SERVER_NAME" \
                --rule-name "$RULE_NAME" \
                --start-ip-address "$RUNNER_IP" \
                --end-ip-address "$RUNNER_IP"
              return 0
            fi
            printf '%s\n' "$output" >&2
            return 1
          }

          delete_firewall_rule() {
            local output
            if output=$(az postgres flexible-server firewall-rule delete \
              --only-show-errors \
              --output none \
              --resource-group $RESOURCE_GROUP \
              --server-name "$PG_SERVER_NAME" \
              --name "$RULE_NAME" \
              --yes 2>&1); then
              return 0
            fi
            if grep -q "unrecognized arguments: --server-name" <<<"$output"; then
              az postgres flexible-server firewall-rule delete \
                --only-show-errors \
                --output none \
                --resource-group $RESOURCE_GROUP \
                --name "$PG_SERVER_NAME" \
                --rule-name "$RULE_NAME" \
                --yes
              return 0
            fi
            printf '%s\n' "$output" >&2
            return 1
          }

          cleanup() {
            delete_firewall_rule || true
          }
          trap cleanup EXIT

          create_firewall_rule

          PG_HOST=$(az postgres flexible-server show \
            --only-show-errors \
            --resource-group $RESOURCE_GROUP \
            --name "$PG_SERVER_NAME" \
            --query fullyQualifiedDomainName -o tsv)
          PG_PASSWORD=$(az keyvault secret show \
            --only-show-errors \
            --vault-name "$KV_NAME" \
            --name postgres-password \
            --query value -o tsv)
          ODDS_API_KEY=$(az keyvault secret show \
            --only-show-errors \
            --vault-name "$KV_NAME" \
            --name odds-api-key \
            --query value -o tsv)
          BASKETBALL_API_KEY=$(az keyvault secret show \
            --only-show-errors \
            --vault-name "$KV_NAME" \
            --name basketball-api-key \
            --query value -o tsv)

          export DATABASE_URL="postgresql+asyncpg://pgadmin:${PG_PASSWORD}@${PG_HOST}:5432/nba_gbsv?ssl=require"
          export ODDS_API_KEY
          export BASKETBALL_API_KEY
          export APP_ENV=production
          export LOG_LEVEL=INFO

          python -m pip install .

          # One-time fix: bridge old UUID revision IDs to new sequential IDs.
          # The migration files were renamed (fe486f01aa9b → 007_ingestion_failures)
          # but the production DB still references the old revision.
          # This UPDATE is idempotent — affects 0 rows once the DB is current.
          python - <<'PY'
          import asyncio, os, asyncpg, ssl as _ssl

          OLD_TO_NEW = {
              "fe486f01aa9b": "007_ingestion_failures",
          }

          async def fix_revisions():
              raw = os.environ["DATABASE_URL"]
              dsn = raw.replace("+asyncpg", "").replace("postgresql://", "postgres://")
              # Strip ?ssl=require from DSN; pass ssl via parameter instead
              dsn = dsn.split("?")[0]
              ctx = _ssl.create_default_context()
              ctx.check_hostname = False
              ctx.verify_mode = _ssl.CERT_NONE
              conn = await asyncpg.connect(dsn, ssl=ctx)
              try:
                  row = await conn.fetchrow("SELECT version_num FROM alembic_version")
                  if row and row["version_num"] in OLD_TO_NEW:
                      new = OLD_TO_NEW[row["version_num"]]
                      await conn.execute(
                          "UPDATE alembic_version SET version_num = $1 WHERE version_num = $2",
                          new, row["version_num"],
                      )
                      print(f"Stamped {row['version_num']} → {new}")
                  else:
                      print("Alembic revision is current, no stamp needed.")
              finally:
                  await conn.close()

          asyncio.run(fix_revisions())
          PY

          python -m src migrate

      - name: Deploy API to Container Apps
        run: |
          az containerapp update \
            --only-show-errors \
            --output none \
            --name $API_APP \
            --resource-group $RESOURCE_GROUP \
            --image $ACR_LOGIN_SERVER/$IMAGE_NAME:${{ github.sha }}

      - name: Deploy Worker to Container Apps
        run: |
          az containerapp update \
            --only-show-errors \
            --output none \
            --name $WORKER_APP \
            --resource-group $RESOURCE_GROUP \
            --image $ACR_LOGIN_SERVER/$IMAGE_NAME:${{ github.sha }}

      - name: Verify API health
        run: |
          API_FQDN=$(az containerapp show \
            --only-show-errors \
            --name $API_APP \
            --resource-group $RESOURCE_GROUP \
            --query "properties.configuration.ingress.fqdn" -o tsv)

          echo "Waiting for API at https://${API_FQDN} ..."
          for i in $(seq 1 12); do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "https://${API_FQDN}/health" || echo "000")
            if [ "$HTTP_CODE" = "200" ]; then
              echo "✅ API healthy (HTTP 200)"
              exit 0
            fi
            echo "⏳ Got HTTP $HTTP_CODE — retrying in 10s..."
            sleep 10
          done
          echo "❌ API did not become healthy within 120s"
          exit 1

      - name: Verify model readiness
        if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.bootstrap_models)
        run: |
          set -euo pipefail

          API_FQDN=$(az containerapp show \
            --only-show-errors \
            --name $API_APP \
            --resource-group $RESOURCE_GROUP \
            --query "properties.configuration.ingress.fqdn" -o tsv)

          API_KEY=$(az keyvault secret show \
            --only-show-errors \
            --vault-name "$KV_NAME" \
            --name api-key \
            --query value -o tsv 2>/dev/null || echo "")

          STATUS_JSON=$(curl -fsS -H "X-API-Key: ${API_KEY}" "https://${API_FQDN}/model/status")
          python - "$STATUS_JSON" <<'PY'
          import json
          import sys
          payload = json.loads(sys.argv[1])
          if not payload.get('ready'):
              raise SystemExit("Model is not ready after bootstrap deploy")
          print("Model readiness check passed")
          PY
