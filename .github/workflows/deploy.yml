name: CI/CD

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:
    inputs:
      bootstrap_models:
        description: "Run backfill+train before build and include artifacts in image"
        required: true
        default: true
        type: boolean
      backfill_season:
        description: "Season used for backfill (leave blank for current NBA season)"
        required: false
        default: ""
        type: string
      backfill_days:
        description: "Days of historical data to backfill"
        required: false
        default: "120"
        type: string

# Prevent overlapping deployments; cancel in-flight runs on same ref
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  ACR_NAME: acrnbagbsvv6
  IMAGE_NAME: nba-gbsv-v6
  RESOURCE_GROUP: nba_gbsv_v6_az
  API_APP: ca-nba-gbsv-v6-api
  WORKER_APP: ca-nba-gbsv-v6-worker
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

# ── Test & Lint ─────────────────────────────────────────────────
jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: nba_gbsv
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version-file: ".python-version"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Lint
        run: ruff check src/ tests/

      - name: Run tests
        env:
          ODDS_API_KEY: test-odds-key-ci
          BASKETBALL_API_KEY: test-basketball-key-ci
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/nba_gbsv
          APP_ENV: test
          LOG_LEVEL: WARNING
        run: pytest tests/ -v

  # ── Build, Scan & Push ──────────────────────────────────────────
  build:
    needs: test
    if: ((github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') && github.event_name == 'push') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      security-events: write # for uploading Trivy SARIF

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.bootstrap_models)
        with:
          python-version-file: ".python-version"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Validate Azure credentials secret
        env:
          AZURE_CREDENTIALS: ${{ secrets.AZURE_CREDENTIALS }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import sys

          required = {"clientId", "clientSecret", "subscriptionId", "tenantId"}
          raw = os.environ.get("AZURE_CREDENTIALS", "").strip()
          if not raw:
              print("::error::Missing required GitHub secret AZURE_CREDENTIALS.")
              sys.exit(1)
          try:
              payload = json.loads(raw)
          except json.JSONDecodeError as exc:
              print(f"::error::AZURE_CREDENTIALS is not valid JSON: {exc}")
              sys.exit(1)
          missing = sorted(key for key in required if not payload.get(key))
          if missing:
              print(
                  "::error::AZURE_CREDENTIALS is missing required keys: "
                  + ", ".join(missing)
              )
              sys.exit(1)
          print("AZURE_CREDENTIALS secret structure looks valid.")
          PY

      - uses: azure/login@v3
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Bootstrap models before build
        if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.bootstrap_models)
        env:
          BACKFILL_SEASON: ${{ inputs.backfill_season || '' }}
          BACKFILL_DAYS: ${{ inputs.backfill_days || '120' }}
        run: |
          set -euo pipefail

          PG_SERVER_NAME=psql-nba-gbsv-v6-db
          KV_NAME=kv-nba-gbsv-v6

          RUNNER_IP=$(curl -s https://checkip.amazonaws.com)
          RULE_NAME=allow-gha-bootstrap-${{ github.run_id }}-${{ github.run_attempt }}

          create_firewall_rule() {
            local output
            if output=$(az postgres flexible-server firewall-rule create \
              --only-show-errors \
              --output none \
              --resource-group ${{ env.RESOURCE_GROUP }} \
              --server-name "$PG_SERVER_NAME" \
              --name "$RULE_NAME" \
              --start-ip-address "$RUNNER_IP" \
              --end-ip-address "$RUNNER_IP" 2>&1); then
              return 0
            fi
            if grep -q "unrecognized arguments: --server-name" <<<"$output"; then
              az postgres flexible-server firewall-rule create \
                --only-show-errors \
                --output none \
                --resource-group ${{ env.RESOURCE_GROUP }} \
                --name "$PG_SERVER_NAME" \
                --rule-name "$RULE_NAME" \
                --start-ip-address "$RUNNER_IP" \
                --end-ip-address "$RUNNER_IP"
              return 0
            fi
            printf '%s\n' "$output" >&2
            return 1
          }

          delete_firewall_rule() {
            local output
            if output=$(az postgres flexible-server firewall-rule delete \
              --only-show-errors \
              --output none \
              --resource-group ${{ env.RESOURCE_GROUP }} \
              --server-name "$PG_SERVER_NAME" \
              --name "$RULE_NAME" \
              --yes 2>&1); then
              return 0
            fi
            if grep -q "unrecognized arguments: --server-name" <<<"$output"; then
              az postgres flexible-server firewall-rule delete \
                --only-show-errors \
                --output none \
                --resource-group ${{ env.RESOURCE_GROUP }} \
                --name "$PG_SERVER_NAME" \
                --rule-name "$RULE_NAME" \
                --yes
              return 0
            fi
            printf '%s\n' "$output" >&2
            return 1
          }

          cleanup() {
            delete_firewall_rule || true
          }
          trap cleanup EXIT

          create_firewall_rule

          PG_HOST=$(az postgres flexible-server show \
            --only-show-errors \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --name "$PG_SERVER_NAME" \
            --query fullyQualifiedDomainName -o tsv)

          PG_PASSWORD=$(az keyvault secret show \
            --only-show-errors \
            --vault-name "$KV_NAME" \
            --name postgres-password \
            --query value -o tsv)
          ODDS_API_KEY=$(az keyvault secret show \
            --only-show-errors \
            --vault-name "$KV_NAME" \
            --name odds-api-key \
            --query value -o tsv)
          BASKETBALL_API_KEY=$(az keyvault secret show \
            --only-show-errors \
            --vault-name "$KV_NAME" \
            --name basketball-api-key \
            --query value -o tsv)

          export DATABASE_URL="postgresql+asyncpg://pgadmin:${PG_PASSWORD}@${PG_HOST}:5432/nba_gbsv?ssl=require"
          export ODDS_API_KEY
          export BASKETBALL_API_KEY
          export APP_ENV=production
          export LOG_LEVEL=INFO

          if [ -z "$BACKFILL_SEASON" ]; then
            BACKFILL_SEASON=$(python -c "from src.data.seasons import current_nba_season; print(current_nba_season())")
          fi
          echo "Bootstrapping season ${BACKFILL_SEASON} with ${BACKFILL_DAYS} days of history"

          pip install --no-cache-dir -r requirements.txt
          python -m src migrate
          python -m src backfill --season "$BACKFILL_SEASON" --days "$BACKFILL_DAYS"
          python -m src train

          test -f src/models/artifacts/model_home_fg.json
          test -f src/models/artifacts/model_away_fg.json
          test -f src/models/artifacts/model_home_1h.json
          test -f src/models/artifacts/model_away_1h.json
          test -f src/models/artifacts/metrics.json

      - name: Log in to ACR
        run: az acr login --only-show-errors --name ${{ env.ACR_NAME }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push to ACR
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          provenance: false
          tags: |
            ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v4
        if: always() && hashFiles('trivy-results.sarif') != ''
        with:
          sarif_file: trivy-results.sarif

  # ── Deploy to Azure Container Apps ──────────────────────────────
  deploy:
    needs: build
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version-file: ".python-version"
          cache: "pip"

      - name: Validate Azure credentials secret
        env:
          AZURE_CREDENTIALS: ${{ secrets.AZURE_CREDENTIALS }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import sys

          required = {"clientId", "clientSecret", "subscriptionId", "tenantId"}
          raw = os.environ.get("AZURE_CREDENTIALS", "").strip()
          if not raw:
              print("::error::Missing required GitHub secret AZURE_CREDENTIALS.")
              sys.exit(1)
          try:
              payload = json.loads(raw)
          except json.JSONDecodeError as exc:
              print(f"::error::AZURE_CREDENTIALS is not valid JSON: {exc}")
              sys.exit(1)
          missing = sorted(key for key in required if not payload.get(key))
          if missing:
              print(
                  "::error::AZURE_CREDENTIALS is missing required keys: "
                  + ", ".join(missing)
              )
              sys.exit(1)
          print("AZURE_CREDENTIALS secret structure looks valid.")
          PY

      - uses: azure/login@v3
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Run database migrations
        run: |
          set -euo pipefail

          PG_SERVER_NAME=psql-nba-gbsv-v6-db
          KV_NAME=kv-nba-gbsv-v6

          # Temporarily allow GitHub runner through PostgreSQL firewall
          RUNNER_IP=$(curl -s https://checkip.amazonaws.com)
          RULE_NAME=allow-gha-${{ github.run_id }}-${{ github.run_attempt }}

          create_firewall_rule() {
            local output
            if output=$(az postgres flexible-server firewall-rule create \
              --only-show-errors \
              --output none \
              --resource-group ${{ env.RESOURCE_GROUP }} \
              --server-name "$PG_SERVER_NAME" \
              --name "$RULE_NAME" \
              --start-ip-address "$RUNNER_IP" \
              --end-ip-address "$RUNNER_IP" 2>&1); then
              return 0
            fi
            if grep -q "unrecognized arguments: --server-name" <<<"$output"; then
              az postgres flexible-server firewall-rule create \
                --only-show-errors \
                --output none \
                --resource-group ${{ env.RESOURCE_GROUP }} \
                --name "$PG_SERVER_NAME" \
                --rule-name "$RULE_NAME" \
                --start-ip-address "$RUNNER_IP" \
                --end-ip-address "$RUNNER_IP"
              return 0
            fi
            printf '%s\n' "$output" >&2
            return 1
          }

          delete_firewall_rule() {
            local output
            if output=$(az postgres flexible-server firewall-rule delete \
              --only-show-errors \
              --output none \
              --resource-group ${{ env.RESOURCE_GROUP }} \
              --server-name "$PG_SERVER_NAME" \
              --name "$RULE_NAME" \
              --yes 2>&1); then
              return 0
            fi
            if grep -q "unrecognized arguments: --server-name" <<<"$output"; then
              az postgres flexible-server firewall-rule delete \
                --only-show-errors \
                --output none \
                --resource-group ${{ env.RESOURCE_GROUP }} \
                --name "$PG_SERVER_NAME" \
                --rule-name "$RULE_NAME" \
                --yes
              return 0
            fi
            printf '%s\n' "$output" >&2
            return 1
          }

          cleanup() {
            delete_firewall_rule || true
          }
          trap cleanup EXIT

          create_firewall_rule

          PG_HOST=$(az postgres flexible-server show \
            --only-show-errors \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --name "$PG_SERVER_NAME" \
            --query fullyQualifiedDomainName -o tsv)
          PG_PASSWORD=$(az keyvault secret show \
            --only-show-errors \
            --vault-name "$KV_NAME" \
            --name postgres-password \
            --query value -o tsv)

          export DATABASE_URL="postgresql+asyncpg://pgadmin:${PG_PASSWORD}@${PG_HOST}:5432/nba_gbsv?ssl=require"

          pip install --no-cache-dir -r requirements.txt
          python -m src migrate

      - name: Deploy API to Container Apps
        run: |
          az containerapp update \
            --only-show-errors \
            --output none \
            --name ${{ env.API_APP }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Deploy Worker to Container Apps
        run: |
          az containerapp update \
            --only-show-errors \
            --output none \
            --name ${{ env.WORKER_APP }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Verify API health
        run: |
          API_FQDN=$(az containerapp show \
            --only-show-errors \
            --name ${{ env.API_APP }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query "properties.configuration.ingress.fqdn" -o tsv)

          echo "Waiting for API at https://${API_FQDN} ..."
          for i in $(seq 1 12); do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "https://${API_FQDN}/health" || echo "000")
            if [ "$HTTP_CODE" = "200" ]; then
              echo "✅ API healthy (HTTP 200)"
              exit 0
            fi
            echo "⏳ Got HTTP $HTTP_CODE — retrying in 10s..."
            sleep 10
          done
          echo "❌ API did not become healthy within 120s"
          exit 1

      - name: Verify model readiness
        if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.bootstrap_models)
        run: |
          set -euo pipefail

          API_FQDN=$(az containerapp show \
            --only-show-errors \
            --name ${{ env.API_APP }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query "properties.configuration.ingress.fqdn" -o tsv)

          STATUS_JSON=$(curl -fsS "https://${API_FQDN}/model/status")
          python - "$STATUS_JSON" <<'PY'
          import json
          import sys
          payload = json.loads(sys.argv[1])
          if not payload.get('ready'):
              raise SystemExit("Model is not ready after bootstrap deploy")
          print("Model readiness check passed")
          PY
