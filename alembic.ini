[alembic]
script_location = src/db/migrations
# Overridden at runtime by src/db/migrations/env.py via resolve_database_url().
# This placeholder avoids leaking real credentials in version control.
sqlalchemy.url = postgresql+asyncpg://localhost:5432/nba_gbsv

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
